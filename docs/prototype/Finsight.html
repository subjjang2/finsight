<style>
  :root {
    /* Korean-first type stack (overrides Inter substitute) */
    --font-sans: 'Pretendard', Inter, -apple-system, system-ui, sans-serif;
    --font-display: 'Pretendard', Inter, sans-serif;

    /* finsight dark theme — default (charcoal + emerald). JS keeps these in sync with Tweaks. */
    --accent: #10b981;
    --accent-glow: rgba(16,185,129,0.35);
    --accent-dim: rgba(16,185,129,0.12);
    --canvas: #0a0b0d;
    --surface: #121417;
    --surface-2: #16181c;
    --surface-3: #22252b;
    --line: #23262d;
    --line-strong: #33373f;
    --ink: #f3f5f6;
    --muted: #9aa0a8;
    --muted-soft: #6b7177;
    --up: #34d399;
    --down: #f0716b;

    /* retarget DS component tokens to dark/emerald */
    --color-primary: #10b981;
    --color-primary-active: #0e9e6e;
    --color-primary-disabled: #22252b;
    --color-on-primary: #04140d;
    --color-canvas: #121417;
    --color-surface-strong: #22252b;
    --color-surface-dark: #16181c;
    --color-surface-dark-elevated: #22252b;
    --color-ink: #f3f5f6;
    --color-body: #9aa0a8;
    --color-muted: #9aa0a8;
    --color-hairline: #33373f;
    --color-on-dark: #f3f5f6;
    --color-on-dark-soft: #9aa0a8;
  }

  html, body { background: var(--canvas); }
  body { color: var(--ink); -webkit-font-smoothing: antialiased; word-break: keep-all; }
  #root { min-height: 100vh; }

  /* dark scrollbars */
  ::-webkit-scrollbar { width: 11px; height: 11px; }
  ::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 99px; border: 3px solid var(--canvas); }
  ::-webkit-scrollbar-track { background: transparent; }

  .fs-spin { animation: fs-spin 0.8s linear infinite; }
  @keyframes fs-spin { to { transform: rotate(360deg); } }

  select option { background: #16181c; color: #f3f5f6; }
  button { font-family: var(--font-sans); }
</style>
</head>
