name: AI Review (review-code)

# 비용 통제: 자동 실행하지 않는다. 오직 명시적 게이트로만 트리거한다.
#  - PR에 'ai-review' 라벨을 달 때 (labeled 이벤트)
#  - PR 코멘트에 '@claude' 멘션할 때 (issue_comment)
#
# 구현: 공식 claude-code-action 대신 headless `claude -p "/review-code"`를 직접 실행한다.
# 이유: action@v1은 github_token을 명시해도 OIDC 토큰 교환을 강제해, App 미설치 환경에서
#       실패했다. headless CLI는 OIDC 없이 ANTHROPIC_API_KEY + GITHUB_TOKEN만으로 동작하며,
#       로컬 스모크로 Workflow 완주가 검증된 경로다.
on:
  pull_request:
    types: [labeled]
  issue_comment:
    types: [created]

concurrency:
  group: ai-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write   # 인라인 리뷰 코멘트 + 요약 코멘트 post에 필요

jobs:
  review:
    if: >-
      ${{
        (github.event_name == 'pull_request' && github.event.label.name == 'ai-review' && !github.event.pull_request.draft)
        || (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && contains(github.event.comment.body, '@claude'))
      }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # base...head diff 계산을 위해 전체 히스토리

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run review-code (headless)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # gh CLI 인증(인라인 코멘트 post)
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
        run: |
          claude -p "/review-code — CI headless 실행이다. 리뷰 대상은 PR #$PR_NUMBER 의 변경이다: \`gh pr diff $PR_NUMBER\` 로 diff를 얻어라(gh는 GH_TOKEN으로 이미 인증됨). SKILL.md의 '0. 비용 가드' 단계는 건너뛰고, Workflow(scriptPath: .claude/workflows/review-code.mjs)로 3차원 리뷰+verify를 돌린 뒤, confirmed finding을 \`gh api -X POST repos/{owner}/{repo}/pulls/$PR_NUMBER/comments\` 로 PR 인라인 리뷰 코멘트(심각도 4줄 포맷)로 달고, 판정+집계 요약을 \`gh pr comment $PR_NUMBER --body ...\` 로 남겨라. 사용자 확인 없이 완주하라." \
            --permission-mode acceptEdits \
            --allowedTools "Bash Read Grep Glob Task Workflow SlashCommand Skill TodoWrite Edit Write" \
            --model claude-sonnet-5 \
            --output-format json
