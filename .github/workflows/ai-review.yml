name: AI Review (review-code)

# 비용 통제: 자동 실행하지 않는다. 오직 명시적 게이트로만 트리거한다.
#  - PR에 'ai-review' 라벨을 달 때 (label_trigger)
#  - PR 코멘트에 '@claude' 멘션할 때 (trigger_phrase)
# 두 경우 모두 사람이 의도적으로 요청한 것이므로 유료 API 호출이 예측 가능하다.
on:
  pull_request:
    types: [labeled]
  issue_comment:
    types: [created]

# 같은 PR에서 리뷰가 중복 실행되면 이전 것을 취소한다.
concurrency:
  group: ai-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write   # 인라인 리뷰 코멘트 post에 필요
  issues: write          # @claude 멘션 응답에 필요
  id-token: write        # claude-code-action의 OIDC 토큰 교환에 필요

jobs:
  review:
    # draft PR은 건너뛴다. 라벨 이벤트면 라벨명이 정확히 'ai-review'일 때만.
    if: >-
      ${{
        (github.event_name == 'pull_request' && github.event.label.name == 'ai-review' && !github.event.pull_request.draft)
        || (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && contains(github.event.comment.body, '@claude'))
      }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # base...head diff 계산을 위해 전체 히스토리

      - name: review-code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}   # OIDC 대신 기본 Actions 토큰 사용

          # 인라인 코멘트를 버퍼링해 하나의 PR 리뷰로 정리해 post (기본 true, 명시)
          classify_inline_comments: "true"
          prompt: |
            /review-code — 이 PR의 변경(base 브랜치...head diff)을 리뷰하라.
            headless CI 실행이므로 SKILL.md의 '0. 비용 가드' 단계는 건너뛰고
            곧바로 diff 수집 → 가드레일 발췌 → Workflow(scriptPath: .claude/workflows/review-code.mjs)
            실행 → confirmed findings를 PR 인라인 리뷰 코멘트(심각도 4줄 포맷)로 달고,
            판정+집계 요약을 PR 코멘트로 남겨라. 사용자 확인을 기다리지 말고 완주하라.
          claude_args: "--model claude-sonnet-5 --max-turns 40"
